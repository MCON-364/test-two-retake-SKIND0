name: Autograding Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Copy autograder test files
        run: |
          cp .github/autograder/InventoryManagerTest.java src/test/java/edu/touro/las/mcon364/test2/InventoryManagerTest.java
          cp .github/autograder/TaskDispatcherTest.java src/test/java/edu/touro/las/mcon364/test2/TaskDispatcherTest.java
          cp .github/autograder/ParallelReportBuilderTest.java src/test/java/edu/touro/las/mcon364/test2/ParallelReportBuilderTest.java

      # ══════════════════════════════════════════════════════════════════════
      # Problem 1 — InventoryManager  (25 pts total)
      # basic tests × 1 pt each (13 pts) + concurrency tests × 4 pts (12 pts)
      # ══════════════════════════════════════════════════════════════════════

      - name: IM - addStock increases stock
        id: im-add-stock-increases
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - addStock increases stock"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#addStockIncreasesStockForItem"
          timeout: 10
          max-score: 1

      - name: IM - addStock accumulates
        id: im-add-stock-accumulates
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - addStock accumulates"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#addStockAccumulatesAcrossMultipleCalls"
          timeout: 10
          max-score: 1

      - name: IM - getStock returns zero for unknown
        id: im-get-stock-zero
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - getStock returns zero for unknown"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#getStockReturnsZeroForUnknownItem"
          timeout: 10
          max-score: 1

      - name: IM - addStock throws on zero qty
        id: im-add-stock-throws-zero
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - addStock throws on zero qty"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#addStockThrowsOnZeroQty"
          timeout: 10
          max-score: 1

      - name: IM - addStock throws on negative qty
        id: im-add-stock-throws-negative
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - addStock throws on negative qty"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#addStockThrowsOnNegativeQty"
          timeout: 10
          max-score: 1

      - name: IM - removeStock true when sufficient
        id: im-remove-stock-true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - removeStock true when sufficient"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#removeStockReturnsTrueWhenStockSufficient"
          timeout: 10
          max-score: 1

      - name: IM - removeStock false when insufficient
        id: im-remove-stock-false
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - removeStock false when insufficient"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#removeStockReturnsFalseWhenInsufficientStock"
          timeout: 10
          max-score: 1

      - name: IM - removeStock does not go below zero
        id: im-remove-stock-no-negative
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - removeStock does not go below zero"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#removeStockDoesNotGoBelowZero"
          timeout: 10
          max-score: 1

      - name: IM - removeStock throws on zero qty
        id: im-remove-stock-throws-zero
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - removeStock throws on zero qty"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#removeStockThrowsOnZeroQty"
          timeout: 10
          max-score: 1

      - name: IM - totalUnitsAdded reflects all additions
        id: im-total-reflects
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - totalUnitsAdded reflects all additions"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#totalUnitsAddedReflectsAllAdditions"
          timeout: 10
          max-score: 1

      - name: IM - totalUnitsAdded not affected by removals
        id: im-total-not-affected
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - totalUnitsAdded not affected by removals"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#totalUnitsAddedNotAffectedByRemovals"
          timeout: 10
          max-score: 1

      - name: IM - snapshot is unmodifiable
        id: im-snapshot-unmodifiable
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - snapshot is unmodifiable"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#getSnapshotIsUnmodifiable"
          timeout: 10
          max-score: 1

      - name: IM - snapshot contains current inventory
        id: im-snapshot-contains
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - snapshot contains current inventory"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#getSnapshotContainsCurrentInventory"
          timeout: 10
          max-score: 1

      - name: IM - concurrent addStock no lost updates
        id: im-concurrent-add
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - concurrent addStock no lost updates"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#concurrentAddStockDoesNotLoseUpdates"
          timeout: 10
          max-score: 4

      - name: IM - concurrent removeStock never negative
        id: im-concurrent-remove
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - concurrent removeStock never negative"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#concurrentRemoveNeverGoesNegative"
          timeout: 10
          max-score: 4

      - name: IM - totalUnitsAdded accurate under concurrency
        id: im-total-concurrent
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IM - totalUnitsAdded accurate under concurrency"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=InventoryManagerTest#totalUnitsAddedIsAccurateUnderConcurrency"
          timeout: 10
          max-score: 4

      # ══════════════════════════════════════════════════════════════════════
      # Problem 2 — TaskDispatcher  (35 pts total)
      # ══════════════════════════════════════════════════════════════════════

      - name: TD - dispatch returns one future per task
        id: td-futures-count
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - dispatch returns one future per task"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#dispatchReturnsOneFuturePerTask"
          timeout: 10
          max-score: 4

      - name: TD - dispatch upper-cases each task
        id: td-upper-case
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - dispatch upper-cases each task"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#dispatchUpperCasesEachTask"
          timeout: 10
          max-score: 4

      - name: TD - dispatch does not block caller
        id: td-no-block
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - dispatch does not block caller"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#dispatchDoesNotBlockCaller"
          timeout: 10
          max-score: 5

      - name: TD - completedCount matches results size
        id: td-count-matches
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - completedCount matches results size"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#completedCountMatchesResultsSize"
          timeout: 10
          max-score: 4

      - name: TD - results contain all processed values
        id: td-results-all
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - results contain all processed values"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#resultsContainAllProcessedValues"
          timeout: 10
          max-score: 4

      - name: TD - getResults returns unmodifiable copy
        id: td-results-unmodifiable
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - getResults returns unmodifiable copy"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#getResultsReturnsUnmodifiableCopy"
          timeout: 10
          max-score: 4

      - name: TD - no results lost under concurrency
        id: td-concurrent-no-loss
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - no results lost under concurrency"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#noResultsLostUnderConcurrency"
          timeout: 10
          max-score: 5

      - name: TD - thread pool bounded by POOL_SIZE
        id: td-pool-bounded
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TD - thread pool bounded by POOL_SIZE"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TaskDispatcherTest#threadPoolIsBoundedByPoolSize"
          timeout: 10
          max-score: 5

      # ══════════════════════════════════════════════════════════════════════
      # Problem 3 — ParallelReportBuilder  (40 pts total)
      # ══════════════════════════════════════════════════════════════════════

      - name: PRB - throws on null batches
        id: prb-null
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - throws on null batches"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#throwsOnNullBatches"
          timeout: 10
          max-score: 3

      - name: PRB - throws on empty batches
        id: prb-empty
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - throws on empty batches"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#throwsOnEmptyBatches"
          timeout: 10
          max-score: 3

      - name: PRB - throws on zero workers
        id: prb-zero-workers
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - throws on zero workers"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#throwsOnZeroWorkers"
          timeout: 10
          max-score: 3

      - name: PRB - generateReport returns non-null
        id: prb-non-null
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - generateReport returns non-null"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#generateReportReturnsNonNull"
          timeout: 10
          max-score: 3

      - name: PRB - totalAmount is correct
        id: prb-total-amount
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - totalAmount is correct"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#totalAmountIsCorrect"
          timeout: 10
          max-score: 3

      - name: PRB - totalCount is correct
        id: prb-total-count
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - totalCount is correct"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#totalCountIsCorrect"
          timeout: 10
          max-score: 3

      - name: PRB - globalMax is correct
        id: prb-global-max
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - globalMax is correct"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#globalMaxIsCorrect"
          timeout: 10
          max-score: 3

      - name: PRB - globalMin is correct
        id: prb-global-min
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - globalMin is correct"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#globalMinIsCorrect"
          timeout: 10
          max-score: 3

      - name: PRB - batchesProcessed equals input size
        id: prb-batches-processed
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - batchesProcessed equals input size"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#batchesProcessedEqualsInputSize"
          timeout: 10
          max-score: 3

      - name: PRB - getProcessedBatchCount matches summary
        id: prb-get-processed-count
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - getProcessedBatchCount matches summary"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#getProcessedBatchCountMatchesSummary"
          timeout: 10
          max-score: 3

      - name: PRB - single batch summary correct
        id: prb-single-batch
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - single batch summary correct"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#singleBatchSummaryIsCorrect"
          timeout: 10
          max-score: 5

      - name: PRB - large parallel run correct total
        id: prb-large-parallel
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PRB - large parallel run correct total"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ParallelReportBuilderTest#largeParallelRunProducesCorrectTotal"
          timeout: 10
          max-score: 5

      # ── Reporter ─────────────────────────────────────────────────────────────
      - name: Autograding Reporter
        if: always()
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          IM-ADD-STOCK-INCREASES_RESULTS: "${{ steps.im-add-stock-increases.outputs.result }}"
          IM-ADD-STOCK-ACCUMULATES_RESULTS: "${{ steps.im-add-stock-accumulates.outputs.result }}"
          IM-GET-STOCK-ZERO_RESULTS: "${{ steps.im-get-stock-zero.outputs.result }}"
          IM-ADD-STOCK-THROWS-ZERO_RESULTS: "${{ steps.im-add-stock-throws-zero.outputs.result }}"
          IM-ADD-STOCK-THROWS-NEGATIVE_RESULTS: "${{ steps.im-add-stock-throws-negative.outputs.result }}"
          IM-REMOVE-STOCK-TRUE_RESULTS: "${{ steps.im-remove-stock-true.outputs.result }}"
          IM-REMOVE-STOCK-FALSE_RESULTS: "${{ steps.im-remove-stock-false.outputs.result }}"
          IM-REMOVE-STOCK-NO-NEGATIVE_RESULTS: "${{ steps.im-remove-stock-no-negative.outputs.result }}"
          IM-REMOVE-STOCK-THROWS-ZERO_RESULTS: "${{ steps.im-remove-stock-throws-zero.outputs.result }}"
          IM-TOTAL-REFLECTS_RESULTS: "${{ steps.im-total-reflects.outputs.result }}"
          IM-TOTAL-NOT-AFFECTED_RESULTS: "${{ steps.im-total-not-affected.outputs.result }}"
          IM-SNAPSHOT-UNMODIFIABLE_RESULTS: "${{ steps.im-snapshot-unmodifiable.outputs.result }}"
          IM-SNAPSHOT-CONTAINS_RESULTS: "${{ steps.im-snapshot-contains.outputs.result }}"
          IM-CONCURRENT-ADD_RESULTS: "${{ steps.im-concurrent-add.outputs.result }}"
          IM-CONCURRENT-REMOVE_RESULTS: "${{ steps.im-concurrent-remove.outputs.result }}"
          IM-TOTAL-CONCURRENT_RESULTS: "${{ steps.im-total-concurrent.outputs.result }}"
          TD-FUTURES-COUNT_RESULTS: "${{ steps.td-futures-count.outputs.result }}"
          TD-UPPER-CASE_RESULTS: "${{ steps.td-upper-case.outputs.result }}"
          TD-NO-BLOCK_RESULTS: "${{ steps.td-no-block.outputs.result }}"
          TD-COUNT-MATCHES_RESULTS: "${{ steps.td-count-matches.outputs.result }}"
          TD-RESULTS-ALL_RESULTS: "${{ steps.td-results-all.outputs.result }}"
          TD-RESULTS-UNMODIFIABLE_RESULTS: "${{ steps.td-results-unmodifiable.outputs.result }}"
          TD-CONCURRENT-NO-LOSS_RESULTS: "${{ steps.td-concurrent-no-loss.outputs.result }}"
          TD-POOL-BOUNDED_RESULTS: "${{ steps.td-pool-bounded.outputs.result }}"
          PRB-NULL_RESULTS: "${{ steps.prb-null.outputs.result }}"
          PRB-EMPTY_RESULTS: "${{ steps.prb-empty.outputs.result }}"
          PRB-ZERO-WORKERS_RESULTS: "${{ steps.prb-zero-workers.outputs.result }}"
          PRB-NON-NULL_RESULTS: "${{ steps.prb-non-null.outputs.result }}"
          PRB-TOTAL-AMOUNT_RESULTS: "${{ steps.prb-total-amount.outputs.result }}"
          PRB-TOTAL-COUNT_RESULTS: "${{ steps.prb-total-count.outputs.result }}"
          PRB-GLOBAL-MAX_RESULTS: "${{ steps.prb-global-max.outputs.result }}"
          PRB-GLOBAL-MIN_RESULTS: "${{ steps.prb-global-min.outputs.result }}"
          PRB-BATCHES-PROCESSED_RESULTS: "${{ steps.prb-batches-processed.outputs.result }}"
          PRB-GET-PROCESSED-COUNT_RESULTS: "${{ steps.prb-get-processed-count.outputs.result }}"
          PRB-SINGLE-BATCH_RESULTS: "${{ steps.prb-single-batch.outputs.result }}"
          PRB-LARGE-PARALLEL_RESULTS: "${{ steps.prb-large-parallel.outputs.result }}"
        with:
          runners: im-add-stock-increases,im-add-stock-accumulates,im-get-stock-zero,im-add-stock-throws-zero,im-add-stock-throws-negative,im-remove-stock-true,im-remove-stock-false,im-remove-stock-no-negative,im-remove-stock-throws-zero,im-total-reflects,im-total-not-affected,im-snapshot-unmodifiable,im-snapshot-contains,im-concurrent-add,im-concurrent-remove,im-total-concurrent,td-futures-count,td-upper-case,td-no-block,td-count-matches,td-results-all,td-results-unmodifiable,td-concurrent-no-loss,td-pool-bounded,prb-null,prb-empty,prb-zero-workers,prb-non-null,prb-total-amount,prb-total-count,prb-global-max,prb-global-min,prb-batches-processed,prb-get-processed-count,prb-single-batch,prb-large-parallel
